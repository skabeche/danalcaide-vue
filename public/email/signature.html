<!-- Main Signature Container -->
<table role="presentation" width="450" cellpadding="0" cellspacing="10" border="0" style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #000000; background-color: #ffffff; max-width: 450px;">
  <tbody>
    <!-- Header Section with Logo and Contact Info -->
    <tr>
      <td style="padding: 0;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, Helvetica, sans-serif;">
          <tbody>
            <tr>
              <!-- Logo Cell -->
              <td width="200" style="padding: 0 20px 0 0; vertical-align: middle;">
                <img src="https://danalcaide.com/email/logo.png" alt="" width="200" style="display: block; max-width: 200px; height: auto; border: 0;">
              </td>
              <!-- Vertical Divider -->
              <td width="1" style="padding: 0; border-left: 1px solid #000000; border-right: 1px solid #ffffff;"></td>
              <!-- Contact Info Cell -->
              <td style="padding: 0 0 0 20px; vertical-align: top;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, Helvetica, sans-serif;">
                  <tbody>
                    <!-- Title Row -->
                    <tr style="height: 28px;">
                      <td colspan="2" style="padding: 0; vertical-align: middle;">
                        <h1 style="font-size: 16px; color: #000000; margin: 0;">Web Developer</h1>
                      </td>
                    </tr>
                    <!-- Email Row -->
                    <tr style="height: 28px;">
                      <td width="20" style="padding: 0 12px 0 0; vertical-align: middle;">
                        <img src="https://danalcaide.com/email/audio-waveform.png" alt="" width="20" style="display: block; height: 20px; border: 0;">
                      </td>
                      <td style="padding: 0; vertical-align: middle;">
                        <a href="mailto:info@danalcaide.com" style="text-decoration: none; color: #000000; font-size: 14px; font-family: Arial, Helvetica, sans-serif;">info@danalcaide.com</a>
                      </td>
                    </tr>
                    <!-- Website Row -->
                    <tr style="height: 28px;">
                      <td width="20" style="padding: 0 12px 0 0; vertical-align: middle;">
                        <img src="https://danalcaide.com/email/shell.png" alt="" width="20" style="display: block; height: 20px; border: 0;">
                      </td>
                      <td style="padding: 0; vertical-align: middle;">
                        <a href="https://www.danalcaide.com" style="text-decoration: none; color: #000000; font-size: 14px; font-family: Arial, Helvetica, sans-serif;">www.danalcaide.com</a>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
          </tbody>
        </table>
      </td>
    </tr>
  </tbody>
</table>
